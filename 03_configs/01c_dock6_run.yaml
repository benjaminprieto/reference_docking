# =============================================================================
# 01c DOCK6 Run - Configuration (Reference Docking)
# =============================================================================
# DOCK6 docking with grid_score as primary scoring.
#
# For reference docking: rigid method with tight box (1.0Å from 01b).
# Can also use flex for comparison (anchor-and-grow with tight box).
#
# NOTE: GB/SA solvation is handled by 01f (separate rescore step).
# DOCK6.13 ignores all _secondary score params during flex docking.
#
# OUTPUT: 05_results/{campaign_id}/01c_dock6_run/
#
# Project: reference_docking
# Module: 01c (DOCK6)
# Version: 5.1 — clean for DOCK6.13 (2026-03-25)
# =============================================================================

parameters:
  # "rigid" for pure crystal scoring, "flex" for conformational exploration
  search_method: "rigid"

  # --- Sampling ---
  max_orientations: 5000

  # --- Anchor-and-grow (only used when search_method: flex) ---
  min_anchor_size: 5
  pruning_max_orients: 1000
  pruning_clustering_cutoff: 2.0
  pruning_conformer_score_cutoff: 100.0

  # --- Output poses ---
  num_final_scored_poses: 100
  num_preclustered_conformers: 500
  num_scored_conformers: 100

  # --- Minimization ---
  minimize: true
  simplex_max_iterations: 500
  simplex_max_cycles: 5
  simplex_score_converge: 0.1
  simplex_cycle_converge: 1.0
  simplex_trans_step: 1.0
  simplex_rot_step: 0.1
  simplex_tors_step: 10.0
  simplex_random_seed: -1

  # --- Output ---
  write_orientations: false

  # --- Execution ---
  timeout_per_molecule: 1800
  log_level: "INFO"

outputs:
  subdir: "01c_dock6_run"

# =============================================================================
# USAGE
# =============================================================================
# python 02_scripts/01c_dock6_run.py --config 03_configs/01c_dock6_run.yaml \
#     --campaigns 04_data/campaigns/SD1_reference_pH63/campaign_config.yaml
# =============================================================================
