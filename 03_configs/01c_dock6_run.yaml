# =============================================================================
# 01c DOCK6 Run - Configuration (Rigid Re-Docking)
# =============================================================================
# Runs DOCK6 rigid re-docking for crystallographic ligands.
#
# OUTPUT: 05_results/{campaign_id}/01c_dock6_run/
#
# Project: reference_docking
# Module: 01c (DOCK6 rigid)
# Version: 5.0 — reference docking defaults (2026-03-25)
#
# CHANGES v4.3 → v5.0:
#   - Default search_method: rigid (was flex)
#   - Default gbsa_hawkins: true (reference complexes benefit from solvation)
#   - Removed anchor-and-grow params (not used in rigid mode)
# =============================================================================

parameters:
  search_method: "rigid"

  # --- Sampling ---
  max_orientations: 5000

  # --- Output poses ---
  # DOCK6 6.13 params:
  num_final_scored_poses: 100
  num_preclustered_conformers: 500
  # Legacy param (DOCK6 <6.13 fallback):
  num_scored_conformers: 100

  # --- Minimization ---
  minimize: true
  simplex_max_iterations: 500
  simplex_max_cycles: 5
  simplex_score_converge: 0.1
  simplex_cycle_converge: 1.0
  simplex_trans_step: 1.0
  simplex_rot_step: 0.1
  simplex_tors_step: 10.0
  simplex_random_seed: -1

  # --- Footprint Scoring (per-residue energy decomposition) ---
  compute_footprint_score: true

  # --- GB/SA Hawkins — Implicit Solvation (secondary score) ---
  # Enabled by default for reference docking: corrects in-vacuo
  # electrostatic artifacts for charged residues in crystal complexes.
  gbsa_hawkins: true
  solvent_dielectric: 78.5
  salt_concentration: 0.15
  gb_offset: 0.09

  # --- Output ---
  write_orientations: false

  # --- Execution ---
  timeout_per_molecule: 1800
  log_level: "INFO"

outputs:
  subdir: "01c_dock6_run"

# =============================================================================
# USAGE
# =============================================================================
# python 02_scripts/01c_dock6_run.py --config 03_configs/01c_dock6_run.yaml \
#     --campaign 04_data/campaigns/SD1_reference_pH63/campaign_config.yaml
# =============================================================================
